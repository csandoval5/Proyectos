<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Taller Motos PRO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
</head>
<body>
    <div class="container">
        <!-- Header Mejorado -->
        <header>
            <div class="header-top">
                <h1><i class="fas fa-motorcycle"></i> Taller Motos PRO</h1>
                <div class="user-actions">
                    <button id="btnExportarExcel" class="btn-header" title="Exportar a Excel">
                        <i class="fas fa-file-excel"></i>
                    </button>
                    <button id="btnImportarExcel" class="btn-header" title="Importar desde Excel">
                        <i class="fas fa-upload"></i>
                    </button>
                    <button id="btnExportar" class="btn-header" title="Exportar backup JSON">
                        <i class="fas fa-download"></i>
                    </button>
                    <button id="btnConfig" class="btn-header" title="Configuración">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <span id="totalClientes">0</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-boxes"></i>
                    <span id="totalProductos">0</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="totalVentas">0</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-dollar-sign"></i>
                    <span id="totalIngresos">$0</span>
                </div>
            </div>
        </header>

        <!-- Barra de búsqueda -->
        <div class="search-bar">
            <input type="text" id="buscador" placeholder="🔍 Buscar clientes, productos o ventas...">
            <select id="filtroTipo">
                <option value="todos">Todos</option>
                <option value="clientes">Clientes</option>
                <option value="productos">Productos</option>
                <option value="ventas">Ventas</option>
            </select>
        </div>

        <!-- Tabs mejorados -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('clientes')">
                <i class="fas fa-users"></i> Clientes
                <span id="badgeClientes" class="badge">0</span>
            </button>
            <button class="tab-btn" onclick="showTab('productos')">
                <i class="fas fa-boxes"></i> Productos
                <span id="badgeProductos" class="badge">0</span>
            </button>
            <button class="tab-btn" onclick="showTab('ventas')">
                <i class="fas fa-shopping-cart"></i> Ventas
                <span id="badgeVentas" class="badge">0</span>
            </button>
            <button class="tab-btn" onclick="showTab('reportes')">
                <i class="fas fa-chart-bar"></i> Reportes
            </button>
        </div>

        <!-- Contenido de Tabs -->
        <div id="clientes" class="tab-content active">
            <!-- Formulario mejorado -->
            <div class="form-section">
                <h2><i class="fas fa-user-plus"></i> Nuevo Cliente</h2>
                <form id="formCliente">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Nombre *</label>
                            <input type="text" id="clienteNombre" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Teléfono *</label>
                            <input type="tel" id="clienteTelefono" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-map-marker-alt"></i> Dirección</label>
                            <input type="text" id="clienteDireccion">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-motorcycle"></i> Moto</label>
                            <input type="text" id="clienteMoto" placeholder="Ej: Yamaha MT-03">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Guardar Cliente
                    </button>
                </form>
            </div>
            <div class="table-section">
                <h3>Lista de Clientes <span id="countClientes">0</span></h3>
                <div id="listaClientes"></div>
            </div>
        </div>

        <div id="productos" class="tab-content">
            <div class="form-section">
                <h2><i class="fas fa-box"></i> Nuevo Producto</h2>
                <form id="formProducto">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-tag"></i> Nombre *</label>
                            <input type="text" id="productoNombre" placeholder="Ej: Aceite 10W40" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-dollar-sign"></i> Precio * $</label>
                            <input type="number" id="productoPrecio" step="0.01" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-layer-group"></i> Cantidad *</label>
                            <input type="number" id="productoCantidad" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-warehouse"></i> Stock Mínimo</label>
                            <input type="number" id="productoStockMin" value="5">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Guardar Producto
                    </button>
                </form>
            </div>
            <div class="table-section">
                <h3>Inventario <span id="countProductos">0</span></h3>
                <div id="listaProductos"></div>
            </div>
        </div>

        <div id="ventas" class="tab-content">
            <div class="form-section">
                <h2><i class="fas fa-shopping-cart"></i> Nueva Venta</h2>
                <form id="formVenta">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Cliente *</label>
                            <select id="ventaCliente" required></select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-box"></i> Producto *</label>
                            <select id="ventaProducto" required></select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-calculator"></i> Cantidad *</label>
                            <input type="number" id="ventaCantidad" min="1" required>
                            <small id="precioProducto"></small>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-receipt"></i> Total</label>
                            <input type="text" id="ventaTotal" readonly>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-shopping-cart"></i> Registrar Venta
                    </button>
                </form>
            </div>
            <div class="table-section">
                <h3>Historial de Ventas <span id="countVentas">0</span></h3>
                <div id="listaVentas"></div>
            </div>
        </div>

        <div id="reportes" class="tab-content">
            <div class="reportes-grid">
                <div class="report-card">
                    <h3>Ventas del Día</h3>
                    <div id="ventasHoy" class="numero-grande">0</div>
                    <div id="ingresosHoy" class="monto-grande">$0</div>
                </div>
                <div class="report-card">
                    <h3>Mejor Cliente</h3>
                    <div id="mejorCliente" class="texto-grande">N/A</div>
                    <div id="ventasMejorCliente" class="numero-grande">0</div>
                </div>
                <div class="report-card">
                    <h3>Producto Más Vendido</h3>
                    <div id="productoMasVendido" class="texto-grande">N/A</div>
                    <div id="unidadesVendidas" class="numero-grande">0</div>
                </div>
                <div class="report-card">
                    <h3>Stock Crítico</h3>
                    <div id="stockCritico" class="numero-grande rojo">0</div>
                </div>
            </div>
            <div class="graficos">
                <canvas id="graficoVentas" width="400" height="200"></canvas>
            </div>
        </div>
    </div>

    <!-- Input oculto para importar Excel -->
    <input type="file" id="inputExcel" accept=".xlsx,.xls" style="display:none">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS para Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
